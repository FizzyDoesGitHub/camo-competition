<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS-7 Design Competition Generator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      max-width: 640px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #38bdf8;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .file-input-wrapper {
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: none;
    }
    .file-label {
      display: block;
      padding: 16px 20px;
      background: #334155;
      color: #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      border: 2px dashed #64748b;
      transition: all 0.2s;
      font-weight: 500;
    }
    .file-label:hover {
      background: #475569;
      border-color: #38bdf8;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover {
      background: #0369a1;
    }
    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .download-btn {
      background: #10b981;
      text-decoration: none;
      display: none;
    }
    .download-btn:hover {
      background: #059669;
    }
    #status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #38bdf8;
      min-height: 24px;
      font-weight: 500;
    }
    .preview-container {
      margin-top: 24px;
      display: none;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #334155;
      background: #090d16;
    }
    .preview-container img {
      width: 100%;
      height: auto;
      display: block;
    }
    iframe {
      width: 1px;
      height: 1px;
      border: 0;
      opacity: 0;
      position: absolute;
      left: -9999px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>IS-7 Competition Entry Tool</h1>
    <p>Upload your design file below. Our template engine will automatically fit it into the IS-7 model template and generate your competition preview.</p>

    <div class="file-input-wrapper">
      <label for="userImage" class="file-label" id="fileLabel">📁 Select Your Image / Design</label>
      <input type="file" id="userImage" accept="image/*" onchange="updateFileName()">
    </div>

    <button id="generateBtn" class="btn" onclick="processMockup()" disabled>Loading Template Engine...</button>
    
    <div id="status">Loading template file, please wait...</div>

    <div class="preview-container" id="previewContainer">
      <img id="resultImage" alt="Generated Competition Preview">
    </div>
    
    <br>
    <a id="downloadBtn" class="btn download-btn" download="IS-7_Competition_Entry.png">Download Finished PNG Entry</a>
  </div>

  <iframe id="peaFrame"></iframe>

  <script>
    const PSD_URL = "https://raw.githubusercontent.com/FizzyDoesGitHub/camo-competition/main/IS-7%20Template.psd";
    const TARGET_LAYER_NAME = "Edit me";

    const iframe = document.getElementById("peaFrame");
    const statusEl = document.getElementById("status");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const previewContainer = document.getElementById("previewContainer");
    const resultImage = document.getElementById("resultImage");

    let isEngineReady = false;
    let currentStep = "idle";
    let pendingBuffer = null;

    iframe.src = `https://www.photopea.com/#${encodeURIComponent(JSON.stringify({ files: [PSD_URL] }))}`;

    function updateFileName() {
      const input = document.getElementById("userImage");
      const label = document.getElementById("fileLabel");
      if (input.files.length > 0) {
        label.textContent = `Selected: ${input.files[0].name}`;
      }
    }

    function processMockup() {
      const fileInput = document.getElementById("userImage");
      if (!fileInput.files[0]) {
        alert("Please select an image file first.");
        return;
      }

      statusEl.textContent = "Processing your design into the template...";
      generateBtn.disabled = true;

      const reader = new FileReader();
      reader.onload = function(e) {
        pendingBuffer = e.target.result;
        currentStep = "opening_smart_object";

        // Step 1: Open the Smart Object in Photopea first
        const openSoScript = `
          (function() {
            var mainDoc = app.activeDocument;
            var targetLayer = null;

            for (var i = 0; i < mainDoc.layers.length; i++) {
              if (mainDoc.layers[i].name === "${TARGET_LAYER_NAME}") {
                targetLayer = mainDoc.layers[i];
                break;
              }
            }
            if (!targetLayer) {
              try { targetLayer = mainDoc.artLayers.getByName("${TARGET_LAYER_NAME}"); } catch(err) {}
            }

            if (targetLayer) {
              mainDoc.activeLayer = targetLayer;
              executeAction(stringIDToTypeID("placedLayerEditContents"));
              app.echoToOE("so_opened");
            } else {
              alert("Layer '${TARGET_LAYER_NAME}' not found.");
            }
          })();
        `;
        iframe.contentWindow.postMessage(openSoScript, "*");
      };

      reader.readAsArrayBuffer(fileInput.files[0]);
    }

    window.addEventListener("message", function(e) {
      if (e.data === "done") {
        if (!isEngineReady) {
          isEngineReady = true;
          statusEl.textContent = "Template ready! Select your design and click below.";
          generateBtn.textContent = "Generate Competition Entry";
          generateBtn.disabled = false;
        }
      } 
      else if (e.data === "so_opened" && currentStep === "opening_smart_object") {
        currentStep = "sending_image";
        // Step 2: Now that Smart Object is open, post the raw binary ArrayBuffer
        iframe.contentWindow.postMessage(pendingBuffer, "*");
      } 
      else if (currentStep === "sending_image" && e.data === "done") {
        currentStep = "rendering";
        // Step 3: Photopea imported the binary image. Copy it, paste into Smart Object, save, and export PNG
        const completeScript = `
          (function() {
            var userDoc = app.activeDocument;
            userDoc.selection.selectAll();
            userDoc.activeLayer.copy();
            userDoc.close();

            var smartObjDoc = app.activeDocument;
            smartObjDoc.selection.selectAll();
            smartObjDoc.paste();
            smartObjDoc.save();
            smartObjDoc.close();

            app.documents[0].saveToOE("png");
          })();
        `;
        iframe.contentWindow.postMessage(completeScript, "*");
      } 
      else if (e.data instanceof ArrayBuffer) {
        // Step 4: Finished PNG returned from saveToOE("png")
        const blob = new Blob([e.data], { type: "image/png" });
        const imageUrl = URL.createObjectURL(blob);
        
        resultImage.src = imageUrl;
        previewContainer.style.display = "block";

        downloadBtn.href = imageUrl;
        downloadBtn.style.display = "inline-block";

        statusEl.textContent = "Design rendered successfully!";
        generateBtn.disabled = false;
        currentStep = "idle";
      }
    });
  </script>
</body>
</html>
