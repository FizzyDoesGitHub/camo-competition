<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS-7 Design Competition Generator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      max-width: 640px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #38bdf8;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .file-input-wrapper {
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: none;
    }
    .file-label {
      display: block;
      padding: 16px 20px;
      background: #334155;
      color: #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      border: 2px dashed #64748b;
      transition: all 0.2s;
      font-weight: 500;
    }
    .file-label:hover {
      background: #475569;
      border-color: #38bdf8;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover {
      background: #0369a1;
    }
    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .download-btn {
      background: #10b981;
      text-decoration: none;
      display: none;
    }
    .download-btn:hover {
      background: #059669;
    }
    #status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #38bdf8;
      min-height: 24px;
      font-weight: 500;
    }
    .preview-container {
      margin-top: 24px;
      display: none;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #334155;
      background: #090d16;
    }
    .preview-container img {
      width: 100%;
      height: auto;
      display: block;
    }
    iframe {
      width: 1px;
      height: 1px;
      border: 0;
      opacity: 0;
      position: absolute;
      left: -9999px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>IS-7 Competition Entry Tool</h1>
    <p>Upload your design file below. Our template engine will automatically fit it into the IS-7 model template and generate your competition preview.</p>

    <div class="file-input-wrapper">
      <label for="userImage" class="file-label" id="fileLabel">📁 Select Your Image / Design</label>
      <input type="file" id="userImage" accept="image/*" onchange="updateFileName()">
    </div>

    <button id="generateBtn" class="btn" onclick="processMockup()" disabled>Loading Template Engine...</button>
    
    <div id="status">Loading template file, please wait...</div>

    <div class="preview-container" id="previewContainer">
      <img id="resultImage" alt="Generated Competition Preview">
    </div>
    
    <br>
    <a id="downloadBtn" class="btn download-btn" download="IS-7_Competition_Entry.png">Download Finished PNG Entry</a>
  </div>

  <iframe id="peaFrame"></iframe>

  <script>
    const PSD_URL = "https://raw.githubusercontent.com/FizzyDoesGitHub/camo-competition/main/IS-7%20Template.psd";
    const TARGET_LAYER_NAME = "Edit me";

    const iframe = document.getElementById("peaFrame");
    const statusEl = document.getElementById("status");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const previewContainer = document.getElementById("previewContainer");
    const resultImage = document.getElementById("resultImage");

    let isEngineReady = false;

    // Load Photopea engine
    iframe.src = `https://www.photopea.com/#${encodeURIComponent(JSON.stringify({ files: [PSD_URL] }))}`;

    function updateFileName() {
      const input = document.getElementById("userImage");
      const label = document.getElementById("fileLabel");
      if (input.files.length > 0) {
        label.textContent = `Selected: ${input.files[0].name}`;
      }
    }

    function processMockup() {
      const fileInput = document.getElementById("userImage");
      if (!fileInput.files[0]) {
        alert("Please select an image file first.");
        return;
      }

      statusEl.textContent = "Processing your design into the template...";
      generateBtn.disabled = true;

      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;

        const script = `
          (function() {
            var mainDoc = app.activeDocument;
            
            // Recursive helper to find layer inside nested groups/folders
            function findLayerRecursive(parent, targetName) {
              for (var i = 0; i < parent.layers.length; i++) {
                var l = parent.layers[i];
                // Check layer name (ignoring surrounding spaces)
                if (l.name.replace(/^\\s+|\\s+$/g, '') === targetName) {
                  return l;
                }
                // If this layer is a folder/group, search inside it
                if (l.layers && l.layers.length > 0) {
                  var found = findLayerRecursive(l, targetName);
                  if (found) return found;
                }
              }
              return null;
            }

            var targetLayer = findLayerRecursive(mainDoc, "${TARGET_LAYER_NAME}");

            if (!targetLayer) {
              alert("Could not find layer '${TARGET_LAYER_NAME}'. Please check the PSD layer names.");
              return;
            }

            // Make sure layer is visible and active
            targetLayer.visible = true;
            mainDoc.activeLayer = targetLayer;

            // Open Smart Object contents safely
            try {
              executeAction(stringIDToTypeID("placedLayerEditContents"));
            } catch(err) {
              alert("Layer '${TARGET_LAYER_NAME}' was found, but it is not a Smart Object.");
              return;
            }

            var smartObjDoc = app.activeDocument;

            // Open user's uploaded image
            var userImgDoc = app.open("${dataUrl}", null, true);
            userImgDoc.selection.selectAll();
            userImgDoc.activeLayer.copy();
            userImgDoc.close();

            // Paste inside Smart Object and save
            app.activeDocument = smartObjDoc;
            smartObjDoc.selection.selectAll();
            smartObjDoc.paste();
            smartObjDoc.save();
            smartObjDoc.close();

            // Export final render back to web page
            app.activeDocument = mainDoc;
            mainDoc.saveToOE("png");
          })();
        `;

        iframe.contentWindow.postMessage(script, "*");
      };

      reader.readAsDataURL(fileInput.files[0]);
    }

    // Message listener
    window.addEventListener("message", function(e) {
      if (e.data === "done") {
        if (!isEngineReady) {
          isEngineReady = true;
          statusEl.textContent = "Template ready! Select your design and click below.";
          generateBtn.textContent = "Generate Competition Entry";
          generateBtn.disabled = false;
        }
      } else if (e.data instanceof ArrayBuffer) {
        // Recieved PNG binary render back from Photopea
        const blob = new Blob([e.data], { type: "image/png" });
        const imageUrl = URL.createObjectURL(blob);
        
        resultImage.src = imageUrl;
        previewContainer.style.display = "block";

        downloadBtn.href = imageUrl;
        downloadBtn.style.display = "inline-block";

        statusEl.textContent = "Design rendered successfully!";
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
