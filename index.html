<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS-7 Competition Design Tool</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 1.5rem;
      color: #38bdf8;
    }
    p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .instructions {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 0.85rem;
      color: #e2e8f0;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .instructions span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .editor-wrapper {
      width: 100%;
      max-width: 1400px;
      height: 82vh;
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #334155;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>IS-7 Competition Design Tool</h1>
    <p>Customize your camouflage design directly in the editor below!</p>
    
    <div class="instructions">
      <span>1️⃣ Double-click the <strong>Edit me</strong> layer on the right</span>
      <span>2️⃣ Drag & drop your image into the canvas</span>
      <span>3️⃣ Press <strong>Ctrl+S</strong> (or File > Save) to apply it</span>
      <span>4️⃣ Go to <strong>File > Export as > PNG</strong> to save your entry</span>
    </div>
  </div>

  <div class="editor-wrapper">
    <iframe id="photopeaIframe" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <script>
    // Direct raw link to your PSD file on GitHub
    const PSD_URL = "https://raw.githubusercontent.com/FizzyDoesGitHub/camo-competition/main/IS-7%20Template.psd";

    const iframe = document.getElementById("photopeaIframe");

    // Configure Photopea to load the PSD directly on launch
    const photopeaConfig = {
      files: [PSD_URL],
      environment: {
        theme: 2 // Dark theme
      }
    };

    // Load Photopea cleanly into the visible iframe
    iframe.src = `https://www.photopea.com/#${encodeURIComponent(JSON.stringify(photopeaConfig))}`;
  </script>

</body>
</html>
